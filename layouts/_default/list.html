{{ define "main" }}
  {{ partial "title.html" . }}

  {{ if .Content }}
    <section class="page-content">
      {{ .Content }}
    </section>
  {{ end }}

  <section class="galleries">
    {{ range where .Pages "Params.private" "ne" true }}
      {{ partial "album-card.html" . }}
    {{ end }}
  </section>
{{ end }}
