copyright = "© Elif DOGAN"
defaultContentLanguage = "en"
disableKinds = ["taxonomy"]
enableRobotsTXT = true
#baseURL = "https://elifdogann.github.io/Rataouille_VRControl_Elif_Dogan/"
languageCode = "en"
timeZone = "Europe/Berlin"
timeout = "120s"
title = "IARVR - VR Parkour Game"

[params]
  defaultTheme = "dark"
  description = "Example site for hugo-theme-gallery"
  title = "My Gallery"
  [params.author]
    email = "elliffdogann@gmail.com"
    name = "Elif DOGAN"
  [params.socialIcons]
    #facebook = "https://www.facebook.com/"
    #instagram = "https://www.instagram.com/"
    github = "https://github.com/elifdogann"
    #youtube = "https://www.youtube.com/"
    email = "mailto:elliffdogann@gmail.com"
    #website = "https://example.com"
    #mastodon = "https://example.com"
    #pixelfed = "https://example.com"
    #mixcloud = "https://example.com"
    #flickr = "https://www.flickr.com"
    #500px = "https://500px"
    #whatsapp = "1234567890"
  [params.gallery]
    #boxSpacing = 10
    #targetRowHeight = 288
    #targetRowHeightTolerance = 0.25
  [params.projectResources]
    downloadURL = "https://drive.google.com/file/d/1wkZpttCWBVXp7cKIVoLvXvHb5VATuLZZ/view?usp=sharing"
    presentationURL = "https://docs.google.com/presentation/d/1OcAe3KokxRz_887NnAdP7L6dR0bvbIyzpAZiUxghjvk/edit?usp=sharing"
    #presentationEmbedURL = "https://docs.google.com/presentation/d/1OcAe3KokxRz_887NnAdP7L6dR0bvbIyzpAZiUxghjvk/edit?slide=id.p1#slide=id.p1"

[outputs]
  home = ["HTML", "RSS"]
  page = ["HTML"]
  section = ["HTML"]

[imaging]
  quality = 75
  resampleFilter = "CatmullRom"
  [imaging.exif]
    disableDate = false
    disableLatLong = true
    includeFields = "ImageDescription|Orientation"

[module]
  [module.hugoVersion]
    min = "0.121.2"
  [[module.imports]]
    path = "github.com/nicokaiser/hugo-theme-gallery/v4"

[menu]
  [[menu.footer]]
    name = "GitHub"
    url = "https://github.com/elifdogann"
    weight = 3

[services]
  [services.rss]
    limit = 100

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
